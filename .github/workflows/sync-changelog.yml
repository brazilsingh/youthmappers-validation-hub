name: Sync Changelog into README
on:
  push:
    paths:
      - 'Changelog.md'
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Insert Changelog into README
        run: |
          python - <<'PY'
          from pathlib import Path
          readme_path = Path('README.md')
          changelog_path = Path('Changelog.md')
          if not readme_path.exists():
              print("README.md not found; aborting.")
              raise SystemExit(1)
          readme = readme_path.read_text(encoding='utf-8')
          changelog = changelog_path.read_text(encoding='utf-8').strip()
          start = '<!-- changelog-start -->'
          end = '<!-- changelog-end -->'
          if start not in readme or end not in readme:
              print("Placeholders not found in README.md. Add <!-- changelog-start --> and <!-- changelog-end --> where you want the changelog inserted.")
              raise SystemExit(1)
          before, rest = readme.split(start, 1)
          _, after = rest.split(end, 1)
          new_readme = before + start + "\n\n" + changelog + "\n\n" + end + after
          readme_path.write_text(new_readme, encoding='utf-8')
          print("README.md updated.")
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync Changelog.md into README" || echo "No changes to commit"
          git push
